<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>About — Harbor Light Community Kitchen</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <strong data-i18n="brand">Harbor Light Community Kitchen</strong>
    <nav>
      <a href="index.html" data-i18n="nav.home">Home</a>
      <a href="about.html" data-i18n="nav.about">About</a>
      <a href="#" data-i18n="nav.donate">Donate</a>
    </nav>
  </header>

  <main>
    <!-- defect: page opens at h2 (no h1) -->
    <h2 data-i18n="about.title">About our kitchen</h2>
    <!-- defect: low-contrast lede -->
    <p class="lede" data-i18n="about.lede">
      Founded in 2009, we have served more than two million meals.
    </p>

    <img src="img/garden.svg" />

    <h3 data-i18n="about.mission.title">Our mission</h3>
    <p data-i18n="about.mission.body">
      Nourish the harbor district with dignity, one plate at a time.
    </p>

    <h3 data-i18n="about.contact.title">Get in touch</h3>
    <form>
      <!-- defect: inputs lack labels and accessible names -->
      <input type="text" name="name" />
      <textarea name="message"></textarea>
      <button class="btn" type="submit" data-i18n="about.contact.send">Send</button>
    </form>
  </main>

  <footer>
    <span data-i18n="footer.copy">© Harbor Light Community Kitchen</span>
  </footer>

  <script src="i18n/i18n.js"></script>
</body>
</html>
