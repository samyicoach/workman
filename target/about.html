<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>About — Harbor Light Community Kitchen</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <strong data-i18n="brand">Harbor Light Community Kitchen</strong>
    <nav>
      <a href="index.html" data-i18n="nav.home">Home</a>
      <a href="about.html" data-i18n="nav.about">About</a>
      <a href="#" data-i18n="nav.donate">Donate</a>
    </nav>
  </header>

  <main>
    <h1 class="page-title" data-i18n="about.title">About our kitchen</h1>
    <p class="lede" data-i18n="about.lede">
      Founded in 2009, we have served more than two million meals.
    </p>

    <img src="img/garden.svg" alt="The community garden with fruit trees and green beds on a sunny day" />

    <h2 class="section-title" data-i18n="about.mission.title">Our mission</h2>
    <p data-i18n="about.mission.body">
      Nourish the harbor district with dignity, one plate at a time.
    </p>

    <h2 class="section-title" data-i18n="about.contact.title">Get in touch</h2>
    <form>
      <label class="sr-only" for="contact-name" data-i18n="about.contact.name">Your name</label>
      <input id="contact-name" type="text" name="name" aria-label="Your name" />
      <label class="sr-only" for="contact-message" data-i18n="about.contact.message">Message</label>
      <textarea id="contact-message" name="message" aria-label="Message"></textarea>
      <button class="btn" type="submit" data-i18n="about.contact.send">Send</button>
      <p class="sr-only" role="status" aria-live="polite" id="contact-status"></p>
    </form>
  </main>

  <footer>
    <span data-i18n="footer.copy">© Harbor Light Community Kitchen</span>
  </footer>

  <script src="i18n/i18n.js"></script>
</body>
</html>
